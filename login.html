<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | @lele3000</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #050508; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background-color: #12121a; padding: 40px; border-radius: 15px; border: 1px solid #2d2d3d; width: 350px; text-align: center; box-shadow: 0 0 30px rgba(0, 243, 255, 0.1); }
        .login-box h2 { color: #00f3ff; margin-top: 0; text-shadow: 0 0 10px rgba(0, 243, 255, 0.5); font-size: 2rem; margin-bottom: 30px; }
        input { width: 90%; padding: 15px; margin-bottom: 20px; background: #050508; border: 1px solid #2d2d3d; color: #fff; border-radius: 8px; font-size: 1rem; }
        input:focus { outline: none; border-color: #00f3ff; box-shadow: 0 0 10px rgba(0, 243, 255, 0.3); }
        .btn-login { background-color: #00f3ff; color: #050508; border: none; padding: 15px; width: 100%; font-size: 1.2rem; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.3s; margin-bottom: 15px; }
        .btn-login:hover { box-shadow: 0 0 20px #00f3ff; transform: scale(1.05); }
        .link-registrati { color: #a0a0b0; text-decoration: none; font-size: 0.9rem; transition: 0.3s; cursor: pointer; }
        .link-registrati:hover { color: #00f3ff; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2><i class="fa-solid fa-user-astronaut"></i> Accesso</h2>
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button class="btn-login" onclick="window.location.href='dashboard.html'">Entra nel Pannello</button>
        <a class="link-registrati" onclick="alert('La registrazione sarà attiva a breve!')">Non hai un account? Registrati</a>
    </div>
</body>
</html>
